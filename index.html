<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Pato </title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Música -->
    <audio id="musica" loop>
        <!-- Coloca aquí tu archivo musica.mp3 -->
        <source src="music/oliviacreation-hearts-of-romance-299782.mp3" type="audio/mpeg">
    </audio>

    <!-- Fondo -->
    <div id="stars"></div>
    <div id="shooting-stars"></div>
    <div class="moon"></div>

    <!-- Pantalla inicial -->
    <section id="inicio">

        <h2 class="titulo">
            Una noche para ti...
        </h2>

        <p class="subtitulo">
            Hay algo que quiero decirte 
        </p>

        <div id="sobre">

            <div class="tapa"></div>

            <div class="cuerpo"></div>

            <div class="corazon">
                ❤️
            </div>

        </div>

        <button id="abrir">
            Abrir Carta
        </button>

    </section>

    <!-- Carta -->

    <section id="carta">

        <div class="papel">
            <img src="img/imd1.JPG" alt="luffy">

            <h1>
                Para Pato 
            </h1>

            <div id="texto"></div>

            <p class="firma">
                Con todo mi amor 
            </p>

        </div>

    </section>


    <div id="final">

        <h2>

            

            De todas las estrellas del universo...

            mi favorita siempre serás tú.

            

        </h2>

    </div>

    <script src="script.js"></script>

</body>

</html>
